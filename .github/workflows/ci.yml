name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Django Tests
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: arm_academy_test
          POSTGRES_USER: arm_user
          POSTGRES_PASSWORD: test_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DEBUG: "True"
      SECRET_KEY: ci-test-secret-key-not-for-production
      DATABASE_URL: postgresql://arm_user:test_password@localhost:5432/arm_academy_test
      REDIS_URL: redis://localhost:6379/0
      ALLOWED_HOSTS: localhost,127.0.0.1
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      CELERY_TASK_ALWAYS_EAGER: "True"
      CELERY_TASK_IGNORE_RESULT: "True"
      FRONTEND_URL: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: python manage.py test --verbosity=2

  lint:
    name: Lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install flake8
        run: pip install flake8

      - name: Lint
        run: flake8 apps/ config/ --max-line-length=120 --exclude=migrations --count --statistics

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (verify)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image (verify)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: nginx/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
