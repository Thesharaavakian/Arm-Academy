name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-22.04
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.name }}/arm-academy
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: nginx/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/arm-academy-frontend:${{ steps.meta.outputs.version }}
            ghcr.io/${{ steps.owner.outputs.name }}/arm-academy-frontend:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-22.04
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR
          timeout: 300s
          script: |
            set -euo pipefail

            APP_DIR="/opt/arm-academy"

            # Clone repo if it's not on the server yet
            if [ ! -d "$APP_DIR/.git" ]; then
              sudo git clone https://github.com/Thesharaavakian/Arm-Academy.git "$APP_DIR"
            fi

            # Update only the compose/nginx files — never overwrite .env
            cd "$APP_DIR"
            sudo git fetch origin main
            sudo git checkout FETCH_HEAD -- docker-compose.yml nginx/nginx.conf nginx/Dockerfile Dockerfile

            # Auth to ghcr.io
            echo "$GITHUB_TOKEN" | sudo docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            # Check .env exists (first deploy needs it — run deploy/deploy.sh manually once)
            if [ ! -f "$APP_DIR/.env" ]; then
              echo "ERROR: $APP_DIR/.env not found."
              echo "SSH into the server and run: sudo bash $APP_DIR/deploy/deploy.sh"
              echo "That script creates .env with a fresh SECRET_KEY and DB password."
              exit 1
            fi

            # Pull latest images
            sudo docker compose pull

            # Bring up / restart (no local rebuild)
            sudo docker compose up -d --no-build --remove-orphans

            # Give web service a moment to start
            sleep 5

            # Apply any new migrations
            sudo docker compose exec -T web python manage.py migrate --noinput

            # Refresh static files
            sudo docker compose exec -T web python manage.py collectstatic --noinput --clear

            echo "Deploy complete — $(date)"
            sudo docker compose ps
