apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery
  namespace: arm-academy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery
  template:
    metadata:
      labels:
        app: celery
    spec:
      containers:
        - name: celery
          image: arm-academy:latest
          imagePullPolicy: Never
          command: ["celery", "-A", "config", "worker", "--loglevel=info", "--concurrency=2"]
          envFrom:
            - configMapRef:
                name: arm-academy-config
            - secretRef:
                name: arm-academy-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "300m"
