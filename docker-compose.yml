version: '3.9'

# Image names used by CI/CD — `docker compose pull` fetches from ghcr.io.
# Local dev: `docker compose up --build` builds and tags locally with these names.
x-backend-image: &backend-image ghcr.io/thesharaavakian/arm-academy:${IMAGE_TAG:-latest}
x-frontend-image: &frontend-image ghcr.io/thesharaavakian/arm-academy-frontend:${IMAGE_TAG:-latest}

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arm_academy}
      POSTGRES_USER: ${POSTGRES_USER:-arm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arm_password}
    shm_size: '128m'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arm_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: *backend-image
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-arm_user}:${POSTGRES_PASSWORD:-arm_password}@db:5432/${POSTGRES_DB:-arm_academy}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery:
    image: *backend-image
    build: .
    command: ["celery", "-A", "config", "worker", "--loglevel=info", "--concurrency=2"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-arm_user}:${POSTGRES_PASSWORD:-arm_password}@db:5432/${POSTGRES_DB:-arm_academy}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      disable: true

  nginx:
    image: *frontend-image
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "${EXTERNAL_PORT:-8080}:80"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
